name: Publish to PSGallery

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          # Verify the manifest is valid
          $manifest = Test-ModuleManifest -Path ./PwrCortex.psd1 -ErrorAction Stop
          Write-Host "Publishing PwrCortex v$($manifest.Version) to PSGallery"

          Publish-Module -Path ./ -NuGetApiKey $env:NUGET_API_KEY -Repository PSGallery -Verbose
