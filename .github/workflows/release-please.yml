name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Check token configuration
        env:
          HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
        run: |
          if [ "$HAS_RELEASE_TOKEN" = "true" ]; then
            echo "✓ Using RELEASE_PLEASE_TOKEN (PAT) for PR creation"
          else
            echo "::warning title=RELEASE_PLEASE_TOKEN not set::Falling back to GITHUB_TOKEN. PR creation will fail unless 'Allow GitHub Actions to create and approve pull requests' is enabled in Settings → Actions → General. To fix, add a PAT with repo scope as the RELEASE_PLEASE_TOKEN secret."
          fi

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify manifest version matches release tag
        shell: pwsh
        run: |
          $tag = '${{ needs.release-please.outputs.tag_name }}' -replace '^v',''
          $manifest = Test-ModuleManifest -Path ./PwrCortex.psd1 -ErrorAction Stop
          Write-Host "Release tag: $tag"
          Write-Host "Manifest version: $($manifest.Version)"
          if ($manifest.Version.ToString() -ne $tag) {
            throw "Version mismatch: manifest=$($manifest.Version) tag=$tag"
          }

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-Module -Path ./ -NuGetApiKey $env:NUGET_API_KEY -Repository PSGallery -Verbose
